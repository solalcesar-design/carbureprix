<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAS LIQUID - Proximité</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root { --green: #00ff87; --blue-glow: #00d2ff; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); background-attachment: fixed; color: white; padding-bottom: 50px; }
        
        .header { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        
        #map { height: 300px; margin: 15px; border-radius: 20px; border: 2px solid var(--green); display: none; z-index: 1; }

        .search-container { margin: 15px; padding: 20px; background: var(--glass); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; gap: 10px; }
        
        .row { display: flex; gap: 10px; }
        input, select { flex: 1; padding: 15px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: white; font-size: 14px; outline: none; }
        
        .btn-gps { background: var(--blue-glow); color: #000; width: 50px; border-radius: 12px; border: none; cursor: pointer; }
        .btn-main { width: 100%; padding: 15px; background: var(--green); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        .card { background: var(--glass); margin: 15px; padding: 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Correction Nom Station */
        .brand { font-size: 1.3rem; font-weight: 900; color: var(--green); text-transform: uppercase; margin-bottom: 5px; }
        .address { font-size: 0.8rem; color: rgba(255,255,255,0.6); display: block; margin-bottom: 15px; }

        /* Correction Grille des Prix */
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .price-item { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 12px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; /* Aligne le nom à gauche et le prix à droite */
            align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .f-name { font-size: 0.65rem; font-weight: bold; color: var(--blue-glow); text-transform: uppercase; }
        .f-val { font-size: 1.3rem; font-weight: 900; color: #fff; margin-left: 10px; } /* Espace ajouté ici */
        
        #loader { display: none; text-align: center; padding: 20px; color: var(--green); }
    </style>
</head>
<body>

<div class="header"><h1>⛽ GAS PROXY</h1></div>

<div class="search-container">
    <div class="row">
        <input type="text" id="searchInput" placeholder="Ville ou Code Postal">
        <button class="btn-gps" onclick="geolocaliser()" title="Ma position"><i class="fas fa-location-crosshairs"></i></button>
    </div>
    <div class="row">
        <select id="rangeInput">
            <option value="5000">Rayon : 5 km</option>
            <option value="10000" selected>Rayon : 10 km</option>
            <option value="20000">Rayon : 20 km</option>
            <option value="50000">Rayon : 50 km</option>
        </select>
        <button class="btn-main" onclick="rechercher()">CHERCHER</button>
    </div>
</div>

<div id="map"></div>
<div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i> Localisation en cours...</div>
<div id="results"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Liste des marques à rechercher dans les données brutes
    const MARQUES_CLEFS = ["TOTAL", "INTERMARCHE", "LECLERC", "CARREFOUR", "SUPER U", "ESSO", "AVIA", "VULCO", "CASINO", "AUCHAN", "BP", "SHELL"];

    let map = L.map('map').setView([46.2, 2.2], 6);
    let markersLayer = L.layerGroup().addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    function geolocaliser() {
        const loader = document.getElementById('loader');
        loader.style.display = "block";
        if (!navigator.geolocation) {
            alert("La géolocalisation n'est pas supportée.");
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (pos) => rechercher(pos.coords.latitude, pos.coords.longitude),
            () => { loader.style.display = "none"; alert("Impossible d'accéder à votre position."); }
        );
    }

    async function rechercher(lat = null, lon = null) {
        const query = document.getElementById('searchInput').value.trim();
        const range = document.getElementById('rangeInput').value;
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');
        const mapDiv = document.getElementById('map');

        resultsDiv.innerHTML = "";
        markersLayer.clearLayers();
        loader.style.display = "block";

        let filter = "";
        if (lat && lon) {
            filter = `within_distance(geom%2C%20geom'POINT(${lon}%20${lat})'%2C%20${range}m)`;
        } else if (query) {
            if (/^\d{5}$/.test(query)) filter = `cp%3D%22${query}%22`;
            else filter = `ville%20LIKE%20%22${query.toUpperCase()}%22`;
        } else {
            alert("Entrez une ville ou utilisez le bouton GPS.");
            loader.style.display = "none";
            return;
        }

        const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=${filter}&limit=50`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            loader.style.display = "none";

            if (!data.results || data.results.length === 0) {
                resultsDiv.innerHTML = "<p style='text-align:center'>Aucune station dans cette zone.</p>";
                return;
            }

            // Tri par prix Gazole croissant
            const sorted = data.results.sort((a, b) => (parseFloat(a.gazole_prix) || 99) - (parseFloat(b.gazole_prix) || 99));

            mapDiv.style.display = "block";
            let bounds = [];
            if (lat && lon) {
                L.circle([lat, lon], {radius: 200, color: 'blue'}).addTo(markersLayer).bindPopup("Vous êtes ici");
                bounds.push([lat, lon]);
            }

            sorted.forEach((s, i) => {
                // --- Nettoyage et identification de la marque ---
                let nomNettoye = "STATION";
                // On combine tous les champs de texte bruts fournis par l'API
                let texteBrut = (s.adresse + " " + s.ville + " " + s.nom + " " + s.marque).toUpperCase();
                
                // On cherche si une marque connue est cachée dans ce texte
                for (let marque of MARQUES_CLEFS) {
                    if (texteBrut.includes(marque)) {
                        nomNettoye = marque;
                        break;
                    }
                }
                
                if (s.geom) {
                    const m = L.marker([s.geom.lat, s.geom.lon]).bindPopup(`<b>${nomNettoye}</b><br>${s.gazole_prix || '--'}€`);
                    markersLayer.addLayer(m);
                    bounds.push([s.geom.lat, s.geom.lon]);
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="brand">${i === 0 ? '🏆 ' : ''}${nomNettoye}</div>
                    <div class="address"><i class="fas fa-map-marker-alt"></i> ${s.adresse}, ${s.ville}</div>
                    
                    <div class="price-grid">
                        <div class="price-item">
                            <span class="f-name">GAZOLE</span>
                            <span class="f-val">${s.gazole_prix || '--'}€</span>
                        </div>
                        <div class="price-item">
                            <span class="f-name">SP95-E10</span>
                            <span class="f-val">${s.e10_prix || '--'}€</span>
                        </div>
                    </div>
                `;
                resultsDiv.appendChild(card);
            });

            map.fitBounds(bounds);
            setTimeout(() => map.invalidateSize(), 200);

        } catch (e) {
            loader.style.display = "none";
            alert("Erreur de connexion.");
        }
    }
</script>
</body>
</html>
