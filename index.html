<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAS LIQUID - Fix Localisation</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --liquid-bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-green: #00ff87;
            --neon-blue: #00d2ff;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--liquid-bg);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
        
        input, select {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: white;
            outline: none;
        }

        .btn-gps {
            width: 55px;
            background: rgba(0, 210, 255, 0.2);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn-search {
            width: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            color: #0f172a;
            cursor: pointer;
            text-transform: uppercase;
        }

        #map { height: 250px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--glass-border); display: none; }

        .station-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        .brand { color: var(--neon-green); font-weight: 800; font-size: 1.2rem; }
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .price-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; text-align: center; }
        .p-val { font-size: 1.3rem; font-weight: 900; display: block; }
        .p-label { font-size: 0.7rem; color: var(--neon-blue); }

        #loader { display: none; text-align: center; padding: 20px; color: var(--neon-green); }
        #customRangeBox { margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header" style="text-align: center; padding: 20px;"><h1>GAS LIQUID</h1></div>

    <div class="glass-panel">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="Ville ou Code Postal">
            <button class="btn-gps" onclick="clicGPS()" id="gpsBtn"><i class="fas fa-location-arrow"></i></button>
        </div>

        <select id="rangeSelect" onchange="checkCustom()">
            <option value="5000">5 km</option>
            <option value="10000" selected>10 km</option>
            <option value="20000">20 km</option>
            <option value="custom">Distance perso...</option>
        </select>

        <div id="customRangeBox">
            <input type="number" id="customInput" placeholder="KM (ex: 15)">
        </div>

        <button class="btn-search" style="margin-top:12px" onclick="lancerRecherche()">Rechercher</button>
    </div>

    <div id="map"></div>
    <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br><span id="loaderMsg">Recherche...</span></div>
    <div id="results"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map = L.map('map');
    let markers = L.layerGroup().addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    function checkCustom() {
        document.getElementById('customRangeBox').style.display = (document.getElementById('rangeSelect').value === 'custom') ? 'block' : 'none';
    }

    // FONCTION GPS AMELIOREE
    function clicGPS() {
        const loader = document.getElementById('loader');
        const loaderMsg = document.getElementById('loaderMsg');
        
        if (!navigator.geolocation) {
            alert("Votre navigateur ne supporte pas la géolocalisation.");
            return;
        }

        loader.style.display = "block";
        loaderMsg.innerText = "Calcul de votre position...";

        const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                console.log("Position trouvée :", pos.coords.latitude, pos.coords.longitude);
                lancerRecherche(pos.coords.latitude, pos.coords.longitude);
            },
            (err) => {
                loader.style.display = "none";
                console.error("Erreur GPS :", err);
                if(err.code === 1) alert("Permission refusée. Activez la localisation dans les réglages du navigateur.");
                else if(err.code === 3) alert("Délai d'attente dépassé (Time Out). Réessayez.");
                else alert("Erreur de localisation : " + err.message);
            },
            options
        );
    }

    async function lancerRecherche(lat = null, lon = null) {
        const query = document.getElementById('searchInput').value.trim();
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');
        const mapDiv = document.getElementById('map');
        const rangeVal = document.getElementById('rangeSelect').value;
        const customVal = document.getElementById('customInput').value;

        loader.style.display = "block";
        document.getElementById('loaderMsg').innerText = "Récupération des prix...";
        resultsDiv.innerHTML = "";
        markers.clearLayers();

        let radius = (rangeVal === 'custom') ? (parseInt(customVal) * 1000) : parseInt(rangeVal);
        let filter = "";

        if (lat && lon) {
            // Filtrage géographique précis
            filter = `within_distance(geom, geom'POINT(${lon} ${lat})', ${radius}m)`;
        } else if (query) {
            filter = /^\d{5}$/.test(query) ? `cp="${query}"` : `ville LIKE "${query.toUpperCase()}"`;
        } else {
            alert("Veuillez saisir une ville ou cliquer sur le bouton GPS");
            loader.style.display = "none";
            return;
        }

        const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=${encodeURIComponent(filter)}&limit=50`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            loader.style.display = "none";

            if (!data.results || data.results.length === 0) {
                resultsDiv.innerHTML = "<p style='text-align:center'>Aucune station trouvée dans ce rayon.</p>";
                mapDiv.style.display = "none";
                return;
            }

            mapDiv.style.display = "block";
            let points = [];

            // Marqueur pour votre position
            if(lat && lon) {
                L.circleMarker([lat, lon], {radius: 8, color: '#00d2ff', fillColor: '#00d2ff', fillOpacity: 0.8}).addTo(markers).bindPopup("Vous êtes ici");
                points.push([lat, lon]);
            }

            // Tri par prix Gazole
            data.results.sort((a,b) => (parseFloat(a.gazole_prix)||99) - (parseFloat(b.gazole_prix)||99));

            data.results.forEach((s, i) => {
                if (s.geom) {
                    L.marker([s.geom.lat, s.geom.lon]).addTo(markers).bindPopup(`<b>${s.marque || 'Station'}</b><br>${s.gazole_prix || '--'}€`);
                    points.push([s.geom.lat, s.geom.lon]);
                }

                resultsDiv.innerHTML += `
                    <div class="station-card">
                        <div class="brand">${i === 0 ? '🏆 ' : ''}${s.marque || 'STATION'}</div>
                        <div style="font-size:11px; opacity:0.7">${s.adresse}, ${s.ville}</div>
                        <div class="price-grid">
                            <div class="price-item"><span class="p-label">GAZOLE</span><span class="p-value">${s.gazole_prix || '--'}€</span></div>
                            <div class="price-item"><span class="p-label">SP95-E10</span><span class="p-value">${s.e10_prix || '--'}€</span></div>
                        </div>
                    </div>
                `;
            });

            map.fitBounds(points, {padding: [30, 30]});
            setTimeout(() => map.invalidateSize(), 400);

        } catch (error) {
            loader.style.display = "none";
            alert("Erreur de connexion.");
        }
    }
</script>
</body>
</html>
