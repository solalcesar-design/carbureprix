<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAS LIQUID - Navigation</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root { --green: #00ff87; --blue: #00d2ff; --glass: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f172a; color: white; padding-bottom: 50px; }
        
        .header { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        
        #map { height: 280px; margin: 15px; border-radius: 20px; border: 1px solid var(--blue); display: none; }

        .search-container { margin: 15px; padding: 20px; background: var(--glass); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; gap: 10px; }
        input, select { flex: 1; padding: 15px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; color: white; outline: none; }
        
        .btn-gps { background: var(--blue); color: #000; width: 55px; border-radius: 15px; border: none; cursor: pointer; }
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(90deg, var(--green), var(--blue)); color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        .card { background: var(--glass); margin: 15px; padding: 20px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); position: relative; overflow: hidden; }
        .brand { font-size: 1.4rem; font-weight: 900; color: var(--green); text-transform: uppercase; margin-bottom: 2px; display: block; }
        .address { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 15px; display: block; }

        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .price-item { background: rgba(0, 0, 0, 0.3); padding: 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255, 255, 255, 0.05); }
        .f-name { font-size: 0.7rem; font-weight: bold; color: var(--blue); }
        .f-val { font-size: 1.2rem; font-weight: 900; }

        /* Bouton Google Maps */
        .btn-nav { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); color: var(--blue); border: 1px solid var(--blue); border-radius: 12px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .btn-nav:hover { background: var(--blue); color: #000; }

        #loader { display: none; text-align: center; padding: 30px; color: var(--green); }
    </style>
</head>
<body>

<div class="header"><h1>GAS LIQUID</h1></div>

<div class="search-container">
    <div class="row">
        <input type="text" id="searchInput" placeholder="Ville ou Code Postal">
        <button class="btn-gps" onclick="geolocaliser()"><i class="fas fa-location-arrow"></i></button>
    </div>
    <select id="rangeInput">
        <option value="5000">Rayon : 5 km</option>
        <option value="15000" selected>Rayon : 15 km</option>
        <option value="30000">Rayon : 30 km</option>
    </select>
    <button class="btn-main" onclick="rechercher()">Rechercher</button>
</div>

<div id="map"></div>
<div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
<div id="results"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const MARQUES_CLEFS = ["TOTAL", "INTERMARCHE", "LECLERC", "CARREFOUR", "SUPER U", "ESSO", "AVIA", "VULCO", "CASINO", "AUCHAN", "BP", "SHELL", "NETTO", "SYSTEME U", "DYNEFF"];

    let map = L.map('map');
    let markersLayer = L.layerGroup().addTo(map);
    // Utilisation des tuiles CARTO (plus fiables sur GitHub Pages)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    function geolocaliser() {
        document.getElementById('loader').style.display = "block";
        navigator.geolocation.getCurrentPosition(
            (pos) => rechercher(pos.coords.latitude, pos.coords.longitude),
            () => { document.getElementById('loader').style.display = "none"; alert("Activez le GPS"); }
        );
    }

    async function rechercher(lat = null, lon = null) {
        const query = document.getElementById('searchInput').value.trim();
        const range = document.getElementById('rangeInput').value;
        const loader = document.getElementById('loader');
        const resultsDiv = document.getElementById('results');

        loader.style.display = "block";
        resultsDiv.innerHTML = "";
        markersLayer.clearLayers();

        let filter = "";
        if (lat && lon) {
            filter = `within_distance(geom, geom'POINT(${lon} ${lat})', ${range}m)`;
        } else if (query) {
            filter = /^\d{5}$/.test(query) ? `cp="${query}"` : `ville LIKE "${query.toUpperCase()}"`;
        } else {
            alert("Saisissez une ville");
            loader.style.display = "none";
            return;
        }

        const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=${encodeURIComponent(filter)}&limit=40`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            loader.style.display = "none";

            if (!data.results || data.results.length === 0) {
                resultsDiv.innerHTML = "<p style='text-align:center'>Aucune station.</p>";
                return;
            }

            document.getElementById('map').style.display = "block";
            let points = [];
            if(lat && lon) points.push([lat, lon]);

            data.results.sort((a,b) => (parseFloat(a.gazole_prix)||9)- (parseFloat(b.gazole_prix)||9)).forEach((s, i) => {
                
                // --- LOGIQUE POUR TROUVER LE NOM ---
                let nomStation = "Station";
                let fullInfo = `${s.nom} ${s.marque} ${s.adresse}`.toUpperCase();
                
                for (let m of MARQUES_CLEFS) {
                    if (fullInfo.includes(m)) { nomStation = m; break; }
                }

                if (s.geom) {
                    L.marker([s.geom.lat, s.geom.lon]).addTo(markersLayer).bindPopup(`<b>${nomStation}</b>`);
                    points.push([s.geom.lat, s.geom.lon]);
                }

                // Lien Google Maps avec coordonnées précises
                const gmapsLink = `https://www.google.com/maps/dir/?api=1&destination=${s.geom.lat},${s.geom.lon}`;

                resultsDiv.innerHTML += `
                    <div class="card">
                        <span class="brand">${i === 0 ? '🏆 ' : ''}${nomStation}</span>
                        <span class="address">${s.adresse}, ${s.ville}</span>
                        <div class="price-grid">
                            <div class="price-item"><span class="f-name">GAZOLE</span><span class="f-val">${s.gazole_prix || '--'}€</span></div>
                            <div class="price-item"><span class="f-name">E10</span><span class="f-val">${s.e10_prix || '--'}€</span></div>
                        </div>
                        <a href="${gmapsLink}" target="_blank" class="btn-nav">
                            <i class="fas fa-location-arrow"></i> Y ALLER
                        </a>
                    </div>
                `;
            });

            map.fitBounds(points, {padding: [30, 30]});
            setTimeout(() => map.invalidateSize(), 300);

        } catch (e) { loader.style.display = "none"; alert("Erreur réseau"); }
    }
</script>
</body>
</html>
