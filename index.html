<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAS LIQUID - Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root { --green: #00ff87; --blue: #00d2ff; --glass: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f172a; color: white; padding-bottom: 50px; }
        
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .header { text-align: center; padding: 20px 0; letter-spacing: 2px; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
        input, select {
            flex: 1; padding: 15px; background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 15px; color: white; outline: none; font-size: 16px;
        }

        #customRangeBox { display: none; margin-bottom: 12px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-gps { background: rgba(0, 210, 255, 0.2); color: var(--blue); width: 55px; border-radius: 15px; border: 1px solid var(--blue); cursor: pointer; }
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(90deg, var(--green), var(--blue)); color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        #map { height: 280px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; display: none; }

        .card { background: var(--glass); padding: 20px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 15px; }
        .brand { font-size: 1.4rem; font-weight: 900; color: var(--green); text-transform: uppercase; margin-bottom: 5px; }
        .address { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 15px; display: block; }

        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .price-item { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .p-label { font-size: 0.7rem; font-weight: bold; color: var(--blue); }
        .p-val { font-size: 1.2rem; font-weight: 900; }

        .btn-nav { 
            width: 100%; padding: 12px; background: rgba(0, 210, 255, 0.1); 
            color: var(--blue); border: 1px solid var(--blue); border-radius: 12px; 
            text-decoration: none; display: flex; align-items: center; justify-content: center; 
            gap: 8px; font-weight: bold; transition: 0.3s; 
        }
        .btn-nav:hover { background: var(--blue); color: #000; }

        #loader { display: none; text-align: center; padding: 20px; color: var(--green); }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>GAS LIQUID</h1></div>

    <div class="glass-panel">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="Ville ou Code Postal">
            <button class="btn-gps" onclick="geolocaliser()"><i class="fas fa-location-arrow"></i></button>
        </div>

        <select id="rangeSelect" onchange="checkCustom()">
            <option value="5000">Rayon : 5 km</option>
            <option value="10000" selected>Rayon : 10 km</option>
            <option value="20000">Rayon : 20 km</option>
            <option value="50000">Rayon : 50 km</option>
            <option value="custom">-- Distance Perso --</option>
        </select>

        <div id="customRangeBox">
            <input type="number" id="customInput" placeholder="Entrez les KM (ex: 12)">
        </div>

        <button class="btn-main" style="margin-top:12px" onclick="rechercher()">Chercher</button>
    </div>

    <div id="map"></div>
    <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
    <div id="results"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const MARQUES = ["TOTAL", "INTERMARCHE", "LECLERC", "CARREFOUR", "SUPER U", "ESSO", "AVIA", "VULCO", "CASINO", "AUCHAN", "BP", "SHELL", "NETTO", "SYSTEME U", "DYNEFF", "AGIP", "ELAN"];

    let map = L.map('map');
    let markersLayer = L.layerGroup().addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    function checkCustom() {
        document.getElementById('customRangeBox').style.display = 
            (document.getElementById('rangeSelect').value === 'custom') ? 'block' : 'none';
    }

    function geolocaliser() {
        document.getElementById('loader').style.display = "block";
        navigator.geolocation.getCurrentPosition(
            (pos) => rechercher(pos.coords.latitude, pos.coords.longitude),
            () => { document.getElementById('loader').style.display = "none"; alert("Erreur GPS : vérifiez vos réglages"); }
        );
    }

    async function rechercher(lat = null, lon = null) {
        const query = document.getElementById('searchInput').value.trim();
        const rSelect = document.getElementById('rangeSelect').value;
        const cInput = document.getElementById('customInput').value;
        const loader = document.getElementById('loader');
        const resultsDiv = document.getElementById('results');

        let rayonMeters = (rSelect === 'custom') ? (parseInt(cInput) * 1000) : parseInt(rSelect);
        
        if (rSelect === 'custom' && !cInput) { alert("Indiquez une distance"); return; }

        loader.style.display = "block";
        resultsDiv.innerHTML = "";
        markersLayer.clearLayers();

        let filter = "";
        if (lat && lon) {
            filter = `within_distance(geom, geom'POINT(${lon} ${lat})', ${rayonMeters}m)`;
        } else if (query) {
            filter = /^\d{5}$/.test(query) ? `cp="${query}"` : `ville LIKE "${query.toUpperCase()}"`;
        } else {
            alert("Saisissez une ville ou utilisez le GPS");
            loader.style.display = "none";
            return;
        }

        const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=${encodeURIComponent(filter)}&limit=45`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            loader.style.display = "none";

            if (!data.results || data.results.length === 0) {
                resultsDiv.innerHTML = "<p style='text-align:center'>Désolé, aucune station trouvée.</p>";
                return;
            }

            document.getElementById('map').style.display = "block";
            let points = [];
            if(lat && lon) points.push([lat, lon]);

            data.results.sort((a,b) => (parseFloat(a.gazole_prix)||9)-(parseFloat(b.gazole_prix)||9)).forEach((s, i) => {
                
                // --- RECHERCHE DU NOM ---
                let name = "Station";
                let raw = `${s.nom} ${s.marque} ${s.adresse}`.toUpperCase();
                for (let m of MARQUES) { if (raw.includes(m)) { name = m; break; } }

                if (s.geom) {
                    L.marker([s.geom.lat, s.geom.lon]).addTo(markersLayer).bindPopup(`<b>${name}</b>`);
                    points.push([s.geom.lat, s.geom.lon]);
                }

                // LIEN GOOGLE MAPS CORRIGÉ
                const gLink = `https://www.google.com/maps/dir/?api=1&destination=${s.geom.lat},${s.geom.lon}`;

                resultsDiv.innerHTML += `
                    <div class="card">
                        <span class="brand">${i === 0 ? '🏆 ' : ''}${name}</span>
                        <span class="address">${s.adresse}, ${s.ville}</span>
                        <div class="price-grid">
                            <div class="price-item"><span class="p-label">GAZOLE</span><span class="p-val">${s.gazole_prix || '--'}€</span></div>
                            <div class="price-item"><span class="p-label">E10</span><span class="p-val">${s.e10_prix || '--'}€</span></div>
                        </div>
                        <a href="${gLink}" target="_blank" class="btn-nav">
                            <i class="fas fa-map-marked-alt"></i> Y ALLER
                        </a>
                    </div>
                `;
            });

            map.fitBounds(points, {padding: [30, 30]});
            setTimeout(() => map.invalidateSize(), 300);

        } catch (e) { loader.style.display = "none"; alert("Erreur réseau"); }
    }
</script>
</body>
</html>
